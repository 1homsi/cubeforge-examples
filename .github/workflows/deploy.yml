name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Checkout both repos as siblings so path aliases resolve correctly.
      # cubeforge-examples/platformer/vite.config.ts points to ../../cubeforge/packages
      - uses: actions/checkout@v4
        with:
          path: cubeforge-examples

      - uses: actions/checkout@v4
        with:
          repository: 1homsi/cubeforge
          path: cubeforge

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: cubeforge-examples

      - name: Build examples
        run: |
          mkdir -p site
          for example in platformer mario-clone breakout flappy-bird shooter top-down playground; do
            echo "▶ Building $example..."
            cd cubeforge-examples/$example
            bunx vite build --base=/cubeforge-examples/${example}/
            cd ../..
            cp -r cubeforge-examples/$example/dist site/$example
          done

      - name: Create root index
        run: cp cubeforge-examples/index.html site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - uses: actions/deploy-pages@v4
        id: deployment
